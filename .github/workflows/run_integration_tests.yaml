name: Run integration tests
permissions:
  contents: read
on:
  push:
    branches: [main]
    paths:
      - server/**
      - client/**
      - tests/**
      - ".github/workflows/run_integration_tests.yaml"
  pull_request:
    branches: [main]
    paths:
      - server/**
      - client/**
      - tests/**
      - ".github/workflows/run_integration_tests.yaml"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run integration tests
    runs-on: [self-hosted, linux, large, noble, x64]
    defaults:
      run:
        working-directory: integration-tests
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install docker compose
        uses: docker/setup-compose-action@16feee727cbdc83b6a014e6cc26fec4a79bcf30c # v2.2.0
      - name: Build and run integration tests
        run: docker compose up --build --exit-code-from integration-tests
