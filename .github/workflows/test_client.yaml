name: Test Client
permissions:
  contents: read
on:
  push:
    branches: [main]
    paths:
      - client/**
      - ".github/workflows/test_client.yaml"
  pull_request:
    branches: [main]
    paths:
      - client/**
      - ".github/workflows/test_client.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: sudo snap install --classic just
      - run: just --yes setup
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - run: just build
      - run: just lint
      - run: just test
      - run: just unit --output coverage.xml
      - name: Upload coverage.xml as an artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: client_coverage
          path: client/coverage.xml
          if-no-files-found: error
          retention-days: 2
      - name: Upload coverage to codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: client/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
  snap:
    name: Snap
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build
        id: snapcraft
        uses: canonical/snapcraft-multiarch-action@fb63b025e0775a87a0652bcec61107a34f272b74 # v1.10.2
        with:
          path: client
          architecture: ${{ matrix.arch }}
      - name: Upload snapcraft logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runtime-build-log-${{ matrix.arch }}
          path: |
            /home/runner/.cache/snapcraft/log/
            /home/runner/.local/state/snapcraft/log/
      - name: Test snap
        env:
          SNAP_PATH: ${{ steps.snapcraft.outputs.snap }}
        run: |
          sudo apt update
          sudo apt install -y jq
          sudo snap install --dangerous $SNAP_PATH
          sleep 2
          if snap run hwctl ; then
            echo "hwctl didn't return an error when the snap doesn't have the plugs connected"
            exit 1
          else
            echo "hwctl failed, as expected, when the snap doesn't have the plugs connected"
          fi
          sudo snap connect hwctl:hardware-observe
          sudo snap connect hwctl:kernel-module-observe
          sudo snap connect hwctl:system-observe
          snap run hwctl --origin cache |jq .source | grep '"cache"'

          ./client/test_utils/certification_emulator.py certified 8000 &
          ./client/test_utils/certification_emulator.py not-certified 8001 &
          ./client/test_utils/certification_emulator.py image-exists 8002 &
          ./client/test_utils/certification_emulator.py system-exists 8003 &
          ./client/test_utils/certification_emulator.py error 8004 &
          ./client/test_utils/certification_emulator.py error-data 8005 &
          sleep 2
          if snap run hwctl --origin server --server http://localhost:8000 ; then
            echo "hwctl didn't return an error when the server returned an error"
            exit 1
          else
            echo "hwctl failed, as expected, when the server returned an error"
          fi
          sudo snap set hwctl allow-custom-url=true
          snap run hwctl --origin server --server http://localhost:8000 |jq .status | grep '"Certified"'
          snap run hwctl --origin server --server http://localhost:8001 |jq .status | grep '"NotSeen"'
          snap run hwctl --origin server --server http://localhost:8002 |jq .status | grep '"CertifiedImageExists"'
          snap run hwctl --origin server --server http://localhost:8003 |jq .status | grep '"RelatedCertifiedSystemExists"'
          if snap run hwctl --origin server --server http://localhost:8004 ; then
            echo "hwctl didn't return an error when the server returned an error"
            exit 1
          else
            echo "hwctl failed, as expected, when the server returned an error"
          fi
          if snap run hwctl --origin server --server http://localhost:8005 ; then
            echo "hwctl didn't return an error when the server returned an error with data"
            exit 1
          else
            echo "hwctl failed, as expected, when the server returned an error with data"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hwctl_${{ matrix.arch }}.snap
          path: ${{ steps.snapcraft.outputs.snap }}
