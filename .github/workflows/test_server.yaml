name: Test API server
permissions:
  contents: read
on:
  push:
    branches: [main]
    paths:
      - server/**
      - ".github/workflows/test_server.yaml"
  pull_request:
    branches: [main]
    paths:
      - server/**
      - ".github/workflows/test_server.yaml"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-libs:
    if: github.event_name == 'pull_request'
    name: Check Charm Libraries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # necessary to add library status label
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check libraries
        uses: canonical/charming-actions/check-libraries@1753e0803f70445132e92acd45c905aba6473225 # 2.7.0
        with:
          charm-path: server/charm
          credentials: ${{ secrets.CHARMHUB_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test server
    runs-on: self-hosted-linux-amd64-noble-large
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: sudo snap install --classic just
      - run: just check-lock
      - run: just lint
      - run: just test
      - name: Upload coverage.xml as an artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server_coverage
          path: server/coverage/coverage.xml
          if-no-files-found: error
          retention-days: 2
      - name: Upload coverage to codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: server/coverage/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
      - run: just check-schema

  charm:
    name: Test Charm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/charm
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: sudo snap install --classic just
      - run: just check-lock
      - run: just lint
      - run: just test
      - name: Upload coverage.xml as an artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: charm_coverage
          path: server/charm/coverage.xml
          if-no-files-found: error
          retention-days: 2
      - name: Upload coverage to codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: server/charm/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  charm-integration:
    name: Test Charm (integration)
    runs-on: self-hosted-linux-amd64-noble-large
    defaults:
      run:
        working-directory: server/charm
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: sudo snap install --classic just
      - run: just --yes setup
      - name: Export Juju controller names
        id: controllers
        run: |
          LXD_CONTROLLER=$(juju controllers --format=json | jq -r '.controllers | to_entries[] | select(.value.cloud == "localhost") | .key')
          if [[ -z "$LXD_CONTROLLER" ]]
          then
            echo "No LXD controller found."
            juju controllers
            exit 1
          fi
          echo "lxd_controller=$LXD_CONTROLLER" >> "$GITHUB_OUTPUT"
      - run: just integration --logs logs
        env:
          JUJU_MACHINE_CONTROLLER: ${{ steps.controllers.outputs.lxd_controller }}
      - name: Upload charm as an artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: charm
          path: server/charm/*.charm
          if-no-files-found: error
          retention-days: 2
      - name: Upload logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: juju-dump-logs
          path: server/charm/logs
          retention-days: 2
