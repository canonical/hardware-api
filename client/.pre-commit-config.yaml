repos:
  - repo: local
    hooks:
      - id: check-lock
        name: Check lockfile
        entry: just check-lock
        pass_filenames: false
        language: rust
        files: ^(Cargo\.lock|Cargo\.toml)$
        types: [file]
        additional_dependencies:
          - just
      - id: format-rs
        name: Format Rust code
        entry: just format-rs
        pass_filenames: false
        language: rust
        types: [rust]
        additional_dependencies:
          - just
      - id: lint-rs
        name: Lint Rust code
        entry: just lint-rs
        pass_filenames: false
        language: rust
        types: [rust]
        additional_dependencies:
          - just
      - id: format-py
        name: Format Python code
        entry: just format-py
        pass_filenames: false
        language: rust
        types: [python]
        additional_dependencies:
          - just
      - id: lint-py
        name: Lint Python code
        entry: just lint-py
        pass_filenames: false
        language: rust
        types: [python]
        additional_dependencies:
          - just
